<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Segurança Química de Limpeza - Ultimate</title>
    <style>
        /* --- ESTILIZAÇÃO VISUAL (CSS) --- */
        :root {
            --cor-seguro: #2ecc71;
            --cor-perigo: #e74c3c;
            --cor-atencao: #f39c12;
            --cor-fundo: #f4f6f9;
            --cor-card: #ffffff;
            --cor-texto: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--cor-card);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 35px;
            max-width: 750px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            color: #1a252f;
        }

        .subtitulo {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .painel-selecao {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }

        .campo {
            flex: 1;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: #34495e;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            font-size: 15px;
            color: var(--cor-texto);
            background-color: #fff;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: #3498db;
        }

        .resultado-box {
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
            display: none;
            text-align: left;
            animation: deslizarAparecer 0.4s ease forwards;
        }

        .resultado-box.seguro {
            display: block;
            background-color: #e8f8f5;
            border-left: 6px solid var(--cor-seguro);
        }

        .resultado-box.atencao {
            display: block;
            background-color: #fef5e7;
            border-left: 6px solid var(--cor-atencao);
        }

        .resultado-box.perigo {
            display: block;
            background-color: #fcedec;
            border-left: 6px solid var(--cor-perigo);
        }

        .status-titulo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .resultado-box.seguro .status-titulo { color: #117a65; }
        .resultado-box.atencao .status-titulo { color: #b7950b; }
        .resultado-box.perigo .status-titulo { color: #943126; }

        .status-descricao {
            font-size: 14.5px;
            line-height: 1.5;
            color: #34495e;
        }

        @keyframes deslizarAparecer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Simulador de Misturas Químicas</h1>
        <p class="subtitulo">Monitore se a combinação de 16 tipos de insumos de limpeza e solventes é segura ou perigosa.</p>

        <div class="painel-selecao">
            <div class="campo">
                <label for="produtoA">1º Produto:</label>
                <select id="produtoA" onchange="calcularMistura()">
                    <option value="">Selecione um produto...</option>
                    <option value="agua_sanitaria">Água Sanitária (Cloro)</option>
                    <option value="vinagre">Vinagre (Ácido Acético)</option>
                    <option value="amonia">Amoníaco (Amônia)</option>
                    <option value="alcool">Álcool Etílico</option>
                    <option value="detergente">Detergente Neutro</option>
                    <option value="agua_oxigenada">Água Oxigenada</option>
                    <option value="bicarbonato">Bicarbonato de Sódio</option>
                    <option value="desinfetante_pinho">Desinfetante de Pinho</option>
                    <option value="soda_caustica">Limpador de Forno (Soda Cáustica)</option>
                    <option value="sabao_po">Sabão em Pó / Detergente Pó</option>
                    <option value="removedor_ferrugem">Removedor de Ferrugem (Ácido Oxálico)</option>
                    <option value="acetona">Acetona (Solvente)</option>
                    <option value="desengordurante">Desengordurante de Cozinha</option>
                    <option value="limpador_aluminio">Limpador de Alumínio (Ácido Forte)</option>
                    <option value="querosene">Querosene / Aguarrás</option>
                    <option value="alcool_isopropilico">Álcool Isopropílico</option>
                </select>
            </div>

            <div class="campo">
                <label for="produtoB">2º Produto:</label>
                <select id="produtoB" onchange="calcularMistura()">
                    <option value="">Selecione um produto...</option>
                    <option value="agua_sanitaria">Água Sanitária (Cloro)</option>
                    <option value="vinagre">Vinagre (Ácido Acético)</option>
                    <option value="amonia">Amoníaco (Amônia)</option>
                    <option value="alcool">Álcool Etílico</option>
                    <option value="detergente">Detergente Neutro</option>
                    <option value="agua_oxigenada">Água Oxigenada</option>
                    <option value="bicarbonato">Bicarbonato de Sódio</option>
                    <option value="desinfetante_pinho">Desinfetante de Pinho</option>
                    <option value="soda_caustica">Limpador de Forno (Soda Cáustica)</option>
                    <option value="sabao_po">Sabão em Pó / Detergente Pó</option>
                    <option value="removedor_ferrugem">Removedor de Ferrugem (Ácido Oxálico)</option>
                    <option value="acetona">Acetona (Solvente)</option>
                    <option value="desengordurante">Desengordurante de Cozinha</option>
                    <option value="limpador_aluminio">Limpador de Alumínio (Ácido Forte)</option>
                    <option value="querosene">Querosene / Aguarrás</option>
                    <option value="alcool_isopropilico">Álcool Isopropílico</option>
                </select>
            </div>
        </div>

        <div id="quadroResultado" class="resultado-box">
            <div id="statusTitulo" class="status-titulo"></div>
            <div id="statusDescricao" class="status-descricao"></div>
        </div>
    </div>

    <script>
        function calcularMistura() {
            const pA = document.getElementById('produtoA').value;
            const pB = document.getElementById('produtoB').value;
            const quadro = document.getElementById('quadroResultado');
            const titulo = document.getElementById('statusTitulo');
            const descricao = document.getElementById('statusDescricao');

            if (!pA || !pB) {
                quadro.className = "resultado-box";
                return;
            }

            if (pA === pB) {
                mostrarResposta("seguro", "✓ Mistura sem reação", "Misturar compostos idênticos não altera as propriedades químicas originais, modificando apenas o volume do produto.");
                return;
            }

            // Organiza em ordem alfabética para bater com as chaves do switch
            const combinacao = [pA, pB].sort().join('_+_');

            switch(combinacao) {
                // --- CATEGORIA: PERIGO EXTREMO (VERMELHO) ---
                case "agua_sanitaria_+_vinagre":
                    mostrarResposta("perigo", "✕ PERIGO CRÍTICO: Gás Cloro", "A mistura de água sanitária (hipoclorito) com ácidos fracos (vinagre) libera o nocivo Gás Cloro, altamente asfixiante e irritante para as membranas mucosas e pulmões.");
                    break;
                case "agua_sanitaria_+_limpador_aluminio":
                case "agua_sanitaria_+_removedor_ferrugem":
                    mostrarResposta("perigo", "✕ PERIGO CRÍTICO: Emissão Violenta de Gás Cloro", "Limpadores de alumínio e removedores de ferrugem usam ácidos industriais concentrados. O contato com a Água Sanitária resulta em desprendimento imediato de Gás Cloro em níveis perigosos.");
                    break;
                case "agua_sanitaria_+_amonia":
                    mostrarResposta("perigo", "✕ PERIGO CRÍTICO: Vapores de Cloraminas", "Gera compostos gasosos tóxicos conhecidos como cloraminas. Provocam tosse severa, falta de ar incapacitante e risco de lesão pulmonar aguda.");
                    break;
                case "agua_sanitaria_+_alcool":
                case "acetona_+_agua_sanitaria":
                case "agua_sanitaria_+_alcool_isopropilico":
                    mostrarResposta("perigo", "✕ PERIGO: Reação Halofórmica (Clorofórmio)", "A combinação de hipoclorito de sódio com álcoois ou acetona gera subprodutos voláteis tóxicos, como o Clorofórmio. Causa tonturas, náuseas e deprime o sistema nervoso central.");
                    break;
                case "agua_oxigenada_+_vinagre":
                    mostrarResposta("perigo", "✕ PERIGO: Formação de Ácido Peracético", "A mistura gera o equilíbrio químico do ácido peracético. Seus vapores são fortemente corrosivos para os olhos, pele e trato respiratório superior.");
                    break;
                case "agua_sanitaria_+_desinfetante_pinho":
                    mostrarResposta("perigo", "✕ PERIGO: Reação com Compostos Fenólicos", "Os óleos vegetais e fenóis de desinfetantes de pinho reagem com o cloro, produzindo gases organoclorados irritantes e potencialmente nocivos.");
                    break;
                case "limpador_aluminio_+_soda_caustica":
                case "removedor_ferrugem_+_soda_caustica":
                case "soda_caustica_+_vinagre":
                    mostrarResposta("perigo", "✕ PERIGO: Neutralização Exotérmica Violenta", "A reação direta entre um ácido concentrado e uma base forte (soda cáustica) libera energia térmica de forma abrupta, podendo causar a fervura do líquido e projeção de respingos altamente corrosivos.");
                    break;

                // --- CATEGORIA: ATENÇÃO / INFLAMABILIDADE / INEFICÁCIA (AMARELO) ---
                case "bicarbonato_+_vinagre":
                case "bicarbonato_+_limpador_aluminio":
                case "bicarbonato_+_removedor_ferrugem":
                    mostrarResposta("atencao", "⚠ ATENÇÃO: Desprendimento de Dióxido de Carbono", "Ocorre efervescência vigorosa com liberação de gás $CO_2$. Se acondicionada em recipientes hermeticamente fechados, a pressão pode romper o frasco. Além disso, a reação neutraliza o poder ativo de ambos os produtos.");
                    break;
                case "bicarbonato_+_soda_caustica":
                    mostrarResposta("atencao", "⚠ ATENÇÃO: Saturação Alcalina", "Ambos possuem propriedades básicas. A mistura altera o equilíbrio da solução e reduz o potencial específico de saponificação (remoção de gorduras pesadas) da soda cáustica.");
                    break;
                case "agua_sanitaria_+_sabao_po":
                    mostrarResposta("atencao", "⚠ ATENÇÃO: Inativação de Ativos", "O cloro oxida e degrada os tensoativos aniônicos e as enzimas presentes no sabão em pó, diminuindo significativamente a performance de lavagem.");
                    break;
                case "acetona_+_alcool":
                case "acetona_+_alcool_isopropilico":
                case "alcool_+_querosene":
                case "alcool_isopropilico_+_querosene":
                case "acetona_+_querosene":
                    mostrarResposta("atencao", "⚠ ATENÇÃO: Mistura Altamente Inflamável", "Embora não gere gases tóxicos inéditos, a união de múltiplos solventes orgânicos cria uma solução com baixo ponto de fulgor. Os vapores acumulados aumentam drasticamente o risco de incêndios em presença de faíscas.");
                    break;

                // --- CATEGORIA: SEGURO (VERDE) ---
                case "alcool_+_vinagre":
                case "alcool_isopropilico_+_vinagre":
                case "desengordurante_+_vinagre":
                    mostrarResposta("seguro", "✓ Mistura Segura", "Combinação amplamente difundida em protocolos de higienização doméstica para remoção de sujidades em superfícies vítreas e espelhos. Não gera riscos químicos.");
                    break;
                case "agua_sanitaria_+_detergente":
                case "alcool_+_detergente":
                case "alcool_isopropilico_+_detergente":
                case "amonia_+_detergente":
                case "detergente_+_vinagre":
                case "agua_oxigenada_+_detergente":
                case "desengordurante_+_detergente":
                case "detergente_+_sabao_po":
                case "detergente_+_limpador_aluminio":
                case "detergente_+_querosene":
                    mostrarResposta("seguro", "✓ Mistura Segura", "O detergente neutro líquido atua puramente como um surfactante estável. Ele não reage de forma nociva com ácidos, bases ou solventes.");
                    break;
                case "desengordurante_+_sabao_po":
                case "alcool_+_desengordurante":
                case "alcool_isopropilico_+_desengordurante":
                    mostrarResposta("seguro", "✓ Mistura Segura", "Otimiza a desagregação de depósitos lipídicos (gordura acumulada) sem desencadear reações químicas secundárias de risco. Recomenda-se uso de luvas protetoras.");
                    break;

                default:
                    mostrarResposta("seguro", "✓ Sem anomalias químicas registradas", "Esta combinação específica opera em faixas de estabilidade química aceitáveis, sem histórico de acidentes severos. Mantenha os ambientes ventilados.");
            }
        }

        function mostrarResposta(tipo, textoTitulo, textoDescricao) {
            const quadro = document.getElementById('quadroResultado');
            const titulo = document.getElementById('statusTitulo');
            const descricao = document.getElementById('statusDescricao');

            quadro.className = `resultado-box ${tipo}`;
            titulo.innerText = textoTitulo;
            descricao.innerText = textoDescricao;
        }
    </script>
</body>
</html>
